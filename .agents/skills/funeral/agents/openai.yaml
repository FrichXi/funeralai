display_name: "葬AI 产品分析"
short_description: "用葬AI框架对产品做结构化真伪分析，判断一个产品是真有东西还是纯叙事包装"
description: |
  葬AI 产品分析 skill，支持三类分析目标：
  - GitHub 仓库：实查代码结构、提交历史、依赖关系，判断技术实质
  - 产品网页：抓取落地页、文档、定价页，分析宣称与可验证功能的差距
  - 本地材料：读取 .md / .txt / .pdf 等文件，对融资 deck、产品文档等做结构化分析

  分析框架四层：实查（代码/产品跑通了吗）→ 需求验证（有人用吗）→ 壁垒判断（长板多长）→ 叙事审计（吹的和做的差多远）。
  最终给出三档结论：整挺好 / 吹牛逼呢 / 整不明白。
default_prompt: "请提供分析目标：GitHub 仓库地址、产品网页 URL、或本地材料文件路径。"
invocation:
  type: explicit
